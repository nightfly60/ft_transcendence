services:
  mariadb:
    build: ./mariadb
    container_name: mariadb
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/mysql
    restart: always
    networks:
      - transcendence_network

  nginx:
    build:
      context: .
      dockerfile: ./nginx/Dockerfile
    container_name: nginx
    env_file:
      - .env
    ports:
      - "${NGINX_PORT}:443"
    volumes:
      - ./data:/var/www/html
    restart: always
    depends_on:
      - nodejs
    networks:
      - transcendence_network

  angular:
    build: ./angular
    container_name: angular
    volumes:
      - ./angular/src:/app/src
    ports:
      - "4200:4200"
    networks:
      - transcendence_network

  nodejs:
    build: ./nodejs
    container_name: nodejs
    env_file:
      - .env
    restart: always
    volumes:
      - ./nodejs/src:/app/src
      - vite_cache:/app/node_modules/.vite
    ports:
      - "${APP_PORT}:3000"
      - "${VITE_PORT}:5173"
    networks:
      - transcendence_network

  python:
    build: ./python
    container_name: python
    env_file:
      - .env
    networks:
      - transcendence_network

volumes:
  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${LOGIN}/data/db_data
  vite_cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${LOGIN}/data/vite_cache

networks:
  transcendence_network:
    driver: bridge
