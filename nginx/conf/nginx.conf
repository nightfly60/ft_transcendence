daemon off;

events {}

http {
	include			/etc/nginx/mime.types;
	default_type	application/octet-stream;

	server {
		listen 80;
		server_name _;

		location / {
			return 301 https://$host:4443$request_uri;
		}
	}

	server {
		listen 443 ssl;

		ssl_certificate		/etc/ssl/certs/selfsigned-cert.pem;
		ssl_certificate_key	/etc/ssl/private/private-key.pem;

		ssl_protocols TLSv1.2 TLSv1.3;

		client_max_body_size 5m;

		# Angular
		location / {
			proxy_pass http://angular:4200;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection "upgrade";  # nécessaire pour le hot-reload websocket d'Angular
			proxy_set_header Host localhost;
		}

		# Node backend
		location /api/ {
			proxy_pass https://nodejs:3000/;
			proxy_ssl_verify off;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}

		# Avatars
		location /avatars/ {
			proxy_pass https://nodejs:3000/avatars/;
			proxy_ssl_verify off;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
		}

		# Socket.IO
		location /socket.io/ {
			proxy_pass https://nodejs:3000/socket.io/;
			proxy_ssl_verify off;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection "upgrade";
			proxy_set_header Host $host;
		}
	}
}
