<div class="chat-widget">
	<!-- Bouton flottant -->
    <button class="chat-fab" (click)="togglePanel()" [class.open]="panelOpen()" title="Chat de jeu">
      <span class="fab-icon">💬</span>
    </button>

	<!-- Panneau widget ouvert-->
    @if (panelOpen()) {
		<div class="chat-panel">
			<!-- Header -->
        <div class="panel-header">Chat de jeu
			<button class="panel-close" (click)="panelOpen.set(false)">✕</button>
		</div>
		<div class="messages-list" id="messages" #messagesContainer>
			@for (message of messages(); track message.timestamp) {
				@if (message.senderId === this.userId) {
					<div class="msg-bubble mine">
						<div class="msg-text">{{ message.message }}</div>
					</div>
				}
				@else
				{
					<div class="msg-bubble theirs">
						<div class="msg-text">{{ message.message }}</div>
					</div>
				}
			}
		</div>
		<!-- Input -->
		<div class="msg-input-row">
		<input
			class="msg-input"
			type="text"
			[value]="message"
			(input)="message = $any($event.target).value"
			(keyup.enter)="sendMessage()"
			placeholder="Message..."
			autocomplete="off"
		/>
		<button class="msg-send" (click)="sendMessage()">›</button>
		</div>
	</div>
	}
</div>
