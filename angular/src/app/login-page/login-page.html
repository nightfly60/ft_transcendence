<div class="page">
  <div class="card">
	<div class="card-header">
	  <span class="icon">&#9812;</span>
	  <h2>Transcendence</h2>
	</div>
	<div class="auth-buttons">
		<button class="google-btn" (click)="googleAuth()">
		<svg class="google-icon" viewBox="0 0 25 24">
			<path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
			<path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
			<path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
			<path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
		</svg>
		<span>Se connecter avec Google</span>
		</button>

		<button class="intra-btn" (click)="intra42Auth()">
			<img src="https://upload.wikimedia.org/wikipedia/commons/8/8d/42_Logo.svg" class="intra-icon" />
			<span>Se connecter avec 42Intra</span>
		</button>
	</div>
	<div class="tabs">
	  <button [class.active]="tab === 'login'" (click)="tab = 'login'">Se connecter</button>
	  <button [class.active]="tab === 'register'" (click)="tab = 'register'">S'inscrire</button>
	</div>
	@if (tab === 'login') {
	  <form class="form" (ngSubmit)="onLogin()">
		<div class="field">
			<label>Email</label>
			<input type="email" [(ngModel)]="email" name="email" [class.error]="emailError" />
			@if (emailError) {
				<span class="field-error">{{ emailError }}</span>
			}
		</div>
		<div class="field">
			<label>Mot de passe</label>
			<input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required />
			@if (passError) {
				<span class="field-error">{{ passError }}</span>
			}
		</div>
		<button type="submit" class="btn-submit">Connexion</button>
	  </form>
	}
	@if (tab === 'register') {
	  <form class="form" (ngSubmit)="onRegister()">
		<div class="field">
			<label>Pseudo</label>
			<input type="text" [(ngModel)]="username" name="username" placeholder="ChessPlayer42" required />
			@if (usernameError) {
				<span class="field-error">{{ usernameError }}</span>
			}
		</div>
		<div class="field">
			<label>Email</label>
			<input type="email" [(ngModel)]="email" name="email" placeholder="votre@email.com" required />
			@if (emailError) {
				<span class="field-error">{{ emailError }}</span>
			}
		</div>
		<div class="field">
			<label>Mot de passe</label>
			<input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required />
			@if (passError) {
				<span class="field-error">{{ passError }}</span>
			}
		</div>
		<button type="submit" class="btn-submit">Créer un compte</button>
		</form>
	}
	</div>
</div>
