<nav class="navbar">
  <div class="navbar-brand">
    <span class="brand-name">Transcendence</span>
  </div>

  <ul class="navbar-links">
    <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Accueil</a></li>
    <li><a routerLink="/game" routerLinkActive="active">Jouer</a></li>
    <li><a [routerLink]="['/leaderboard']" routerLinkActive="active">Classement</a></li>
    <li><a [routerLink]="['/profile', auth.getUserId()]" routerLinkActive="active">Mon Profil</a></li>
	<li><a [routerLink]="['/settings']" routerLinkActive="active">Parametres</a></li>
    <li><a routerLink="/chat-box" routerLinkActive="active">Chat</a></li>
  </ul>

  <div class="navbar-actions">
    @if (!auth.isLoggedIn()) {
      <button class="btn-login" (click)="openLogin()">Se connecter</button>
    } @else {
      <div class="user-menu">
        <img
          [src]="auth.getAvatarUrl()"
          class="user-avatar"
          (error)="$any($event.target).src = '/avatars/default-avatar.png'"
        />
        <span class="user-name">{{ auth.username() }}</span>
        <button class="btn-logout" (click)="logout()">Deconnexion</button>
      </div>
    }
  </div>

  <button class="hamburger" (click)="toggleMenu()">
    <span></span>
    <span></span>
    <span></span>
  </button>
</nav>

<div class="mobile-menu" [class.open]="menuOpen">
  <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="menuOpen = false">Accueil</a>
  <a routerLink="/game" routerLinkActive="active" (click)="menuOpen = false">Jouer</a>
  <a [routerLink]="['/profile', auth.getUserId()]" routerLinkActive="active" (click)="menuOpen = false">Mon Profil</a>
  <a [routerLink]="['/settings']" routerLinkActive="active" (click)="menuOpen = false">Parametres</a>
  <a [routerLink]="['/leaderboard']" routerLinkActive="active" (click)="menuOpen = false">Classement</a>
  @if (auth.isLoggedIn()) {
    <div class="mobile-user">
      <img
        [src]="auth.getAvatarUrl()"
        class="mobile-avatar"
        (error)="$any($event.target).src = '/avatars/default-avatar.png'"
      />
      <span class="mobile-username">{{ auth.username() }}</span>
    </div>
    <button class="mobile-logout" (click)="logout(); menuOpen = false">Déconnexion</button>
  } @else {
    <button class="mobile-login" (click)="openLogin(); menuOpen = false">Se connecter</button>
  }
</div>
