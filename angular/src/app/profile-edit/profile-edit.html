<div class="page-wrapper">
  <div class="floating-piece">♜</div>
  <div class="floating-piece">♝</div>
  <div class="floating-piece">♛</div>
  <div class="floating-piece">♞</div>
  <div class="floating-piece">♟</div>
  <div class="floating-piece">♚</div>

  <div class="chessboard-bg">
    <div *ngFor="let cell of cells" [style.background]="cell.light ? '#f5f0e8' : 'transparent'"></div>
  </div>

  <div class="edit-page">

    <div class="page-title-row">
      <button class="back-btn" (click)="goBack()">← Retour</button>
      <h1 class="page-title">Modifier le profil</h1>
    </div>

    <div class="gold-separator"></div>

    <!-- Avatar -->
    <div class="avatar-section">
      <div class="avatar-ring" (click)="triggerFileInput()">
        <img
          class="avatar-img"
          [src]="previewUrl || data?.path_img"
          alt="Avatar"
          (error)="$any($event.target).src = '/avatars/default-avatar.png'"
        />
        <div class="avatar-overlay">
          <span class="overlay-icon">✎</span>
          <span class="overlay-label">Changer</span>
        </div>
      </div>
      <input
        #fileInput
        type="file"
        accept="image/*"
        class="file-input-hidden"
        (change)="onFileSelected($event)"
      />
      <p class="avatar-hint">JPG, PNG — max 2 Mo</p>
    </div>

    <div class="gold-separator"></div>

    <!-- Formulaire -->
    <div class="form-section">

      <div class="field-group">
        <label class="field-label">Nom d'utilisateur</label>
        <div class="input-wrapper">
          <input
            class="field-input"
            type="text"
            [(ngModel)]="username"
            [placeholder]="data?.username || 'Votre pseudo'"
            maxlength="30"
          />
          <span class="char-count">{{ username.length }} / 30</span>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Bio</label>
        <div class="input-wrapper">
          <textarea
            class="field-input field-textarea"
            [(ngModel)]="bio"
            [placeholder]="data?.bio || 'Décrivez-vous en quelques mots...'"
            maxlength="200"
            rows="4"
          ></textarea>
          <span class="char-count">{{ bio.length }} / 200</span>
        </div>
      </div>

    </div>

    <div class="gold-separator"></div>

    <!-- Actions -->
    <div class="actions-row">
      <button class="action-btn cancel-btn" (click)="goBack()">Annuler</button>
      <button class="action-btn save-btn" (click)="save()">
        <span *ngIf="!saving">Sauvegarder</span>
        <span *ngIf="saving" class="saving-dots">
          <span>.</span><span>.</span><span>.</span>
        </span>
      </button>
    </div>

  </div>
</div>
