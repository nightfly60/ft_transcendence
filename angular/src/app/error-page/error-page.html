<div class="page-wrapper">

  <!-- pieces qui flottent -->
  <div class="floating-piece">♜</div>
  <div class="floating-piece">♝</div>
  <div class="floating-piece">♛</div>
  <div class="floating-piece">♞</div>
  <div class="floating-piece">♟</div>
  <div class="floating-piece">♚</div>

  <!-- DAMIER DE FOND -->
  <div class="chessboard-bg">
    <div
      *ngFor="let cell of cells"
      [style.background]="cell.light ? '#f5f0e8' : 'transparent'">
    </div>
  </div>

  <!-- CONTENU -->
  <div class="container">

    <!-- LOGO CAVALIER -->
    <div class="knight-wrap">
      <img class="knight-svg" src="https://i.ibb.co/KpsxjP5R/unnamed-removebg-preview-1.png" alt="Cavalier"/>
    </div>

    <div class="gold-line"></div>

    <!-- 404 -->
	<div class="error-code" [attr.data-code]="code">{{ code }}</div>

    <!-- TITRE -->
    <p class="title">Chess 42 - {{ errors[code]?.titre }}</p>

    <!-- SÉPARATEUR -->
    <div class="ornament">♞</div>

    <!-- DESCRIPTION -->
    <p class="description" [innerHTML]="citation"></p>

    <!-- BOUTON -->
    <a routerLink="/" class="btn">Retourner à l'accueil</a>

  </div>

</div>
