<div class="mode-selection">
	<div class="header">
		<h1 class="title">Choisir un mode de jeu</h1>
		<p class="subtitle">Sélectionne comment tu veux jouer</p>
	</div>

	<div class="cards">
		<app-game-mode-solo (selected)="select('solo')" />
		<app-game-mode-multi (selected)="select('multi')" />
		<app-game-mode-ia (selected)="showIaModal = true" />
	</div>

	@if (showIaModal) {
		<app-ia-level-modal
			(levelSelected)="onIaLevelSelected($event)"
			(cancel)="showIaModal = false"
		/>
	}
</div>
