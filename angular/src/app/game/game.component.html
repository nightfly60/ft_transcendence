@if (!selectedMode) {
  <app-game-mode-select (modeSelected)="selectMode($event)" />
} @else {
  <app-game-header
    [mode]="selectedMode"
    [username]="(user$ | async)?.username ?? ''"
    (back)="goBack()"
  />
  <app-game-board
    [gameId]="gameId"
    [mode]="selectedMode"
    (movePlayed)="jouerCoup($event.from, $event.to)"
  />
}
